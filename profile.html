<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Dashboard</title>
<link rel="icon" href="https://www.smartcertificate.com/SmartDiploma/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background: linear-gradient(90deg,#dff7ee,#cfe3f7);
  min-height:100vh;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

/* .logo{
  width:40px;height:40px;
  border-radius:50%;
  border:3px solid #3b82f6;
} */

.lang{
  border:1px solid #ccc;
  padding:8px 12px;
  border-radius:8px;
  background:white;
}

/* PROFILE */
.profile{
  max-width:1000px;
  margin:40px auto;
}

.profile-top{
  display:flex;
  align-items:center;
  gap:20px;
}

.avatar{
  width:90px;
  height:90px;
  background:#ddd;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:#999;
}

.name{
  font-size:48px;
  font-weight:700;
  background:linear-gradient(90deg,#5ec6a7,#7fb8ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SEARCH */
.search{
  margin:30px 0;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #cbd5e1;
}

/* CARD */
.card{
  width:280px;
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGE BOX */
.img-box{
  width:100%;
  height:180px;
  background:#f1f5f9;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.upload-btn{
  position:absolute;
  bottom:10px;
  background:#3b82f6;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

/* CARD TEXT */
.card h3{
  color:#2563eb;
  margin-top:10px;
}

.card p{
  color:#666;
  font-size:14px;
}

/* GRID */
.grid{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* MOBILE */
@media(max-width:768px){
  .name{font-size:28px;}
  .profile{padding:0 20px;}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
   <a href="https://bhawananarwani5-coder.github.io/Certificate/">   <img src="https://www.smartcertificate.com/SmartDiploma/favicon.ico" alt="Logo"></a>
  </div>
  <div class="lang">EN</div>
</div>

<!-- PROFILE -->
<div class="profile">

  <div class="profile-top">
    <div class="avatar">👤</div>
    <div class="name">Bhawna Narwani</div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Search">
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- CARD -->
    <div class="card">

      <!-- IMAGE UPLOAD BOX -->
      <div class="img-box" onclick="uploadImage()">
       <a href="https://bhawananarwani5-coder.github.io/Certificate/">   <img src="assets/Bhawna-certificate.png"></a>

      </div>

      <h3>IE University</h3>
      <p>BS Programs</p>
      <p>MSMC</p>

    </div>

  </div>

</div>

<script>
function uploadImage(){
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(ev){
    const img=document.getElementById('preview');
    img.src=ev.target.result;
    img.style.display='block';
    document.getElementById('placeholder').style.display='none';
  }
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
